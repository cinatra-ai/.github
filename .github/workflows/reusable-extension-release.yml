# Reusable release workflow for a published Cinatra extension.
#
# This is the LIVE org-level reusable workflow (the placement artifact authored
# in the extraction tooling has been placed here; the copy kept in
# extension-release-tooling is a reference mirror of this file). Each extension
# repo carries only a thin `release: published` caller (see examples/release.yml
# — the extraction script ships an identical caller into every extracted repo)
# that calls THIS workflow pinned to a commit SHA.
#
# Prerequisites (see examples/README.md):
#   - CINATRA_MARKETPLACE_VENDOR_TOKEN is set as a GitHub org secret (submit scope)
#   - The job grants `id-token: write` so the dependency-ordering gate can mint a
#     GitHub Actions OIDC token (aud=marketplace) for the broker-mediated existence
#     ability `cinatra/extension-dependency-exists`. No registry read token is needed:
#     registry reads are ACL-gated to the install-broker (its token is, by design,
#     NOT in Actions) and the gate goes through the OIDC-authed ability, never a
#     direct registry GET. (CINATRA_REGISTRY_TOKEN is deprecated/unused here.)
#
# Flow: build the CI artifact from a clean checkout → serverEntry build stage
# (cinatra#161: a manifest declaring `cinatra.serverEntry` gets its entry
# esbuild-bundled into a top-level `register.mjs` in a STAGED pack dir whose
# rewritten manifest satisfies the runtime store's built-artifacts-only
# contract; packing then runs FROM that stage) → packlist leak gate
# (`npm pack --dry-run --json` must list no internal path: `.github/`,
# `.planning`, env files, tests, CI/tooling config — cinatra-engineering#56)
# → npm pack → provenance attestation → submit the EXACT bytes through the
# marketplace MCP proxy (extension-submit-for-review), with the serverEntry
# packed-manifest preflight + dependency-ordering gate enforced locally first.
# NEVER a direct Verdaccio publish.
#
# After a successful submit, a follow-up job decorates the tag's GitHub Release:
# auto-generated "What's Changed" PR-list notes + the exact packed tarball +
# SHA256SUMS.txt. It needs the caller to grant `contents: write` (see
# examples/release.yml) and degrades to a warning — never a failed publish —
# when the grant is missing. It never creates tags (gh --verify-tag).

name: reusable-extension-release

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      github-repo-ref:
        description: "Ref of cinatra-ai/.github to fetch the release tools (release-submit.mjs + build-server-entry.mjs) from."
        type: string
        default: "main"
    secrets:
      CINATRA_MARKETPLACE_VENDOR_TOKEN:
        description: "Submit-scope marketplace vendor token (the GitHub org secret)."
        required: true
      CINATRA_REGISTRY_TOKEN:
        description: "DEPRECATED/UNUSED. The dependency-ordering gate now verifies existence through the OIDC-gated marketplace ability (cinatra/extension-dependency-exists), not a direct registry read. Kept (optional) only so existing callers that still pass it do not error; safe to drop."
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC — provenance attestation AND the dependency-gate + source-identity token mints
      attestations: write   # provenance attestation
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
      tag: ${{ steps.gate.outputs.tag }}
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      # The extension repo at the release tag.
      - name: Checkout extension repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Enable corepack
        run: corepack enable

      # Gate: a tag MUST be present and equal to v<package.json.version>. This
      # holds for BOTH triggers — a published Release (event tag_name) and a
      # manual backfill (workflow_dispatch MUST be run against a tag ref). There
      # is NO ungated path: a dispatch on a branch fails closed, so a stable
      # version can never publish from the default branch. Pre-releases skip.
      - name: Resolve + gate version
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            # workflow_dispatch backfill: refuse anything that is not a tag ref so
            # a branch HEAD can never be published.
            if [ "$REF_TYPE" != "tag" ]; then
              echo "::error::manual backfill must run on a tag ref (got ref_type='${REF_TYPE}', ref='${REF_NAME}')"; exit 1
            fi
            TAG="$REF_NAME"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::no release tag resolved — refusing to publish"; exit 1
          fi
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::tag '${TAG}' does not match v${VERSION} (package.json)"; exit 1
          fi
          if printf '%s' "$VERSION" | grep -q '-'; then
            echo "Pre-release version ${VERSION} — skipping marketplace publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # Install with the committed lockfile when present; extracted repos ship
      # none today, so fall back to a fresh resolve. (Committing a per-repo
      # lockfile is a deferred hardening — see README.md.)
      # Host-coupled extensions (connectors) peer-depend on host-internal
      # @cinatra-ai/* SDK packages (sdk-extensions, sdk-ui, mcp-client, …) that are
      # NEVER on a public registry (model-B: the host provides them at runtime).
      # They therefore cannot be installed / typechecked / tested standalone — the
      # monorepo owns those gates — so a `pnpm install` here 404s on the optional
      # peer (auto-install-peers=false is unreliable across pnpm/CI). Detect via a
      # first-party peerDependency and skip install/typecheck/test for them; the
      # kind gate + `npm pack` + submit need no node_modules.
      - name: Classify extension
        id: classify
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          if node -e "p=require('./package.json');pd=p.peerDependencies||{};process.exit(Object.keys(pd).some(k=>k.startsWith('@cinatra-ai/'))?0:1)"; then
            echo "host_coupled=true" >> "$GITHUB_OUTPUT"
            echo "host-coupled extension (first-party peer deps) — install/typecheck/test skipped; the host owns those gates."
          else
            echo "host_coupled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.gate.outputs.should_publish == 'true' && steps.classify.outputs.host_coupled != 'true'
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack pnpm install --frozen-lockfile
          else
            corepack pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck
        if: steps.gate.outputs.should_publish == 'true' && steps.classify.outputs.host_coupled != 'true'
        run: |
          if node -e "process.exit(((require('./package.json').scripts)||{}).typecheck?0:1)"; then
            corepack pnpm run typecheck
          elif node -e "p=require('./package.json');d={...p.dependencies,...p.devDependencies};process.exit(d.typescript?0:1)"; then
            corepack pnpm exec tsc --noEmit
          else
            echo "no typecheck script and no typescript dependency — nothing to typecheck (skipping)"
          fi

      - name: Test
        if: steps.gate.outputs.should_publish == 'true' && steps.classify.outputs.host_coupled != 'true'
        run: corepack pnpm test --if-present

      # Self-contained per-kind gate shipped into agent/workflow repos.
      - name: Kind gate
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          if [ -f extension-kind-gate.mjs ]; then
            node extension-kind-gate.mjs --package-root .
          else
            echo "no extension-kind-gate.mjs (connector/artifact/skill) — skipping"
          fi

      # ── serverEntry build stage (cinatra#161) ────────────────────────────────
      # The Cinatra runtime package store is BUILT-ARTIFACTS-ONLY: a published
      # `cinatra.serverEntry` must resolve to an existing .mjs/.cjs/.js file or
      # the host REFUSES the install. The in-tree first-party shape
      # (serverEntry "./register" + exports["./register"] → "./src/register.ts")
      # is TS source, so when the manifest declares a serverEntry this stage
      # bundles it with the canonical builder (build-server-entry.mjs — the
      # byte-synced placement copy of scripts/extensions/build-server-entry.mjs
      # in the cinatra monorepo) into a STAGED temp pack dir: top-level
      # register.mjs + the rewritten PACKED manifest (serverEntry
      # "./register.mjs", inlined runtime `dependencies` pruned, register.mjs
      # appended to `files`). The source tree is never touched; every later
      # step (packlist gate, pack, attest, submit) operates on the stage.
      - name: Detect server entry
        id: server_entry
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          if node -e "p=require('./package.json');process.exit(p.cinatra&&typeof p.cinatra.serverEntry==='string'?0:1)"; then
            echo "declared=true" >> "$GITHUB_OUTPUT"
            echo "cinatra.serverEntry declared — building a runtime-store artifact before packing."
          else
            echo "declared=false" >> "$GITHUB_OUTPUT"
          fi

      # Fetch the shared release tools (submit CLI + serverEntry builder) from
      # the org .github repo, then move them OUT of the workspace immediately:
      # the builder stages a copy of this checkout and `npm pack` can run from
      # that stage, so a tools dir left in the tree could leak into the tarball.
      - name: Checkout release tools
        if: steps.gate.outputs.should_publish == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: cinatra-ai/.github
          ref: ${{ inputs.github-repo-ref }}
          path: .cinatra-release
          sparse-checkout: |
            scripts/v622/templates/release/release-submit.mjs
            scripts/v622/templates/release/build-server-entry.mjs
          sparse-checkout-cone-mode: false

      - name: Stage release tools outside the workspace
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/cinatra-tools"
          cp .cinatra-release/scripts/v622/templates/release/release-submit.mjs "$RUNNER_TEMP/cinatra-tools/release-submit.mjs"
          cp .cinatra-release/scripts/v622/templates/release/build-server-entry.mjs "$RUNNER_TEMP/cinatra-tools/build-server-entry.mjs"
          rm -rf .cinatra-release

      # Build inputs for the bundle: the extension's OWN declared dependencies
      # (and devDependencies) must be installed next to the package so esbuild can
      # inline the runtime graph. `--legacy-peer-deps` skips peer auto-install (the
      # @cinatra-ai/* host peers are NEVER on a public registry — model-B
      # host-provided); `--ignore-scripts` runs no lifecycle code (same
      # OIDC-hardening rationale as the submit-tool deps step below).
      - name: Install server-entry build inputs
        if: steps.gate.outputs.should_publish == 'true' && steps.server_entry.outputs.declared == 'true'
        run: npm install --ignore-scripts --legacy-peer-deps --no-package-lock --no-audit --no-fund

      # Host framework build inputs (cinatra-engineering#121). When a serverEntry
      # graph reaches `next/*` the builder's `host-runtime-module-views` plugin
      # FORCES resolution of `next` and inlines `react`/`react-dom` (they are NOT
      # externalized — at runtime the HOST provides them; for the standalone
      # bundle they are build-time-only inputs, compiled into register.mjs and
      # pruned from the published deps). These are HOST-provided framework inputs,
      # not per-connector dependencies, so we provision them in ONE place here
      # rather than asking every companion repo to carry framework devDeps that
      # would drift the host ABI across 11+ repos.
      #
      # Pinned EXACT to the cinatra monorepo (next@16.2.6 / react@19.2.6 /
      # react-dom@19.2.6) so the standalone bundle matches the workspace build and
      # the e2e-pinned builder behavior — the same host-version lockstep the
      # esbuild@0.25.12 pin below already enforces. The release-template drift
      # audit's build-input-pin check asserts these literals equal the cinatra
      # root package.json so a workspace framework bump can't silently diverge.
      #
      # `--no-save` so the package.json is NEVER mutated; this install runs AFTER
      # the package's own deps, so the CENTRAL host pin WINS over any companion
      # framework declaration (a connector pinned to a different `next` major is
      # incompatible with the host runtime view and must not silently win).
      # `--ignore-scripts` mirrors the step above. We deliberately do NOT pass
      # `--legacy-peer-deps` here (eng#121): with it, npm treats an explicitly-named
      # install target that matches an existing host peerDependency as already
      # satisfied-by-the-consumer and ELIDES placing it — react/react-dom are
      # declared peers (^19.2.x) by serverEntry connectors, so the framework inputs
      # would silently fail to land and the build would fail at the `next` →
      # `Could not resolve "react"` wall. Standard peer resolution places all three.
      # This step installs ONLY next/react/react-dom by explicit name with
      # `--no-save` AFTER the package's own graph (line above), so it pulls no
      # @cinatra-ai/* host peer of the connector — the legacy flag is unneeded here.
      # Unconditional on every serverEntry build: a graph that does NOT reach `next`
      # simply does not import these (they stay unreferenced; a build-time grep
      # pre-detector would be a fragile lower bound, so we always provision).
      - name: Provision host framework build inputs (next/react/react-dom)
        if: steps.gate.outputs.should_publish == 'true' && steps.server_entry.outputs.declared == 'true'
        run: npm install --no-save --no-package-lock --ignore-scripts --no-audit --no-fund next@16.2.6 react@19.2.6 react-dom@19.2.6

      # esbuild is the builder's only dependency — installed `--ignore-scripts`
      # into an ISOLATED temp dir (never the extension tree), the same
      # hardening pattern as the submit-tool deps step. Version pinned to the
      # cinatra monorepo's esbuild so release bundles match the e2e-pinned
      # builder output.
      - name: Build server entry (runtime-store artifact)
        id: server_build
        if: steps.gate.outputs.should_publish == 'true' && steps.server_entry.outputs.declared == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/cinatra-esbuild"
          ( cd "$RUNNER_TEMP/cinatra-esbuild" && npm install --no-save --no-package-lock --ignore-scripts --no-audit --no-fund esbuild@0.25.12 )
          node "$RUNNER_TEMP/cinatra-tools/build-server-entry.mjs" . \
            --out "$RUNNER_TEMP/cinatra-server-entry-pack/package" \
            --esbuild-dir "$RUNNER_TEMP/cinatra-esbuild" \
            --json
          echo "pack_dir=$RUNNER_TEMP/cinatra-server-entry-pack/package" >> "$GITHUB_OUTPUT"

      # Packlist leak gate (cinatra-engineering#56). The npm tarball is the
      # DISTRIBUTION artifact crossing a trust boundary (publish-proxy →
      # registry → installer): the release FAILS here if `npm pack --dry-run
      # --json` would ship any non-distributable path — `.github/` (workflows
      # leak pipeline structure, runner labels, secret names, proxy/registry
      # endpoints), `.planning`, env files, key material, tests/fixtures, or
      # CI/build/lint tooling config. The fix in a flagged repo is a
      # package.json `files` ALLOWLIST (fails closed for new files), not an
      # `.npmignore` denylist. npm force-includes root `package.json` /
      # `README*` / `LICENSE*` regardless of `files` — those never flag.
      # `.env.example` is tolerated as documentation (the epic's per-repo
      # carve-out); every other `.env*` fails. The checker is INLINE on
      # purpose: a caller's SHA pin of this workflow then pins the gate's
      # rules too (no mutable side-fetch). Fail-closed: an unparsable or
      # empty pack listing also fails the release.
      # Runs over the STAGED serverEntry build dir when one exists (that stage
      # is what ships); otherwise over the repo root, exactly as before.
      - name: Packlist gate (no internal paths in the publish tarball)
        if: steps.gate.outputs.should_publish == 'true'
        env:
          PACK_DIR: ${{ steps.server_build.outputs.pack_dir || '.' }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/packlist-gate.mjs" <<'PACKLIST_GATE_EOF'
          import { readFileSync } from 'node:fs';

          // npm force-includes these at the package root no matter what
          // `files` / `.npmignore` say — never flag them.
          const FORCE_INCLUDED = /^(package\.json|README(\.[^/]+)?|LICEN[CS]E(\.[^/]+)?)$/i;

          // Directory/segment names that must never ship, at any depth.
          const DENY_SEGMENTS = new Set([
            '.github', '.planning', '.circleci', '.devcontainer', '.husky',
            '.vscode', '.idea', '__tests__', '__fixtures__', '__snapshots__',
            'tests', 'coverage',
          ]);

          // Internal/release script dirs — top-level only (a nested
          // `src/scripts/` may be runtime code; top-level `scripts/`/`tools/`
          // in this org is release/ops tooling).
          const DENY_TOP_DIRS = new Set(['scripts', 'tools']);

          // [regex on basename, reason, optional exemption on basename]
          const DENY_BASENAMES = [
            [/^\.env/i, 'env file — npm does NOT auto-ignore these', (b) => b.toLowerCase() === '.env.example'],
            [/\.(pem|key)$/i, 'key material'],
            [/\.(test|spec)\./i, 'test file'],
            [/^tsconfig.*\.json$/i, 'TypeScript build config'],
            [/^(vitest|jest|babel|rollup|webpack|vite|tsup|esbuild)\.config\./i, 'test-runner/bundler config'],
            [/^\.babelrc(\..+)?$/i, 'transpiler config'],
            [/^\.eslintrc(\..+)?$/i, 'lint config'],
            [/^eslint\.config\./i, 'lint config'],
            [/^\.prettierrc(\..+)?$/i, 'format config'],
            [/^prettier\.config\./i, 'format config'],
            [/^\.editorconfig$/i, 'editor config'],
            [/^\.nvmrc$/i, 'node version pin'],
            [/^(.+\.)?dockerfile$/i, 'Docker build file'],
            [/^\.dockerignore$/i, 'Docker config'],
            [/^\.gitattributes$/i, 'git plumbing (npm does NOT strip it)'],
            [/^\.gitlab-ci\.ya?ml$/i, 'CI config'],
            [/^jenkinsfile$/i, 'CI config'],
            [/^azure-pipelines\.ya?ml$/i, 'CI config'],
            [/^\.travis\.ya?ml$/i, 'CI config'],
            [/^renovate\.json5?$/i, 'CI config'],
            [/^\.pre-commit-config\.ya?ml$/i, 'CI config'],
            [/^dependabot\.ya?ml$/i, 'CI config'],
            [/^codeowners$/i, 'CODEOWNERS'],
          ];

          let parsed;
          try {
            parsed = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          } catch (e) {
            console.error(`::error::packlist gate: cannot parse \`npm pack --dry-run --json\` output (${e.message}) — failing closed`);
            process.exit(1);
          }
          const entry = Array.isArray(parsed) ? parsed[0] : parsed;
          const files = entry && Array.isArray(entry.files) ? entry.files : null;
          if (!files || files.length === 0) {
            console.error('::error::packlist gate: pack listing has no files — failing closed');
            process.exit(1);
          }

          const violations = [];
          for (const f of files) {
            if (!f || typeof f.path !== 'string' || f.path.length === 0) {
              violations.push([JSON.stringify(f && f.path), 'malformed pack listing entry — failing closed']);
              continue;
            }
            const path = f.path.replace(/^\.\//, '');
            if (path.split('/').includes('..')) {
              violations.push([path, 'path traversal in pack listing']);
              continue;
            }
            if (FORCE_INCLUDED.test(path)) continue; // root-level only: no '/' can match
            const segments = path.split('/');
            const basename = segments[segments.length - 1];
            const denySegment = segments.find((s) => DENY_SEGMENTS.has(s.toLowerCase()));
            if (denySegment) {
              violations.push([path, `'${denySegment}/' content must not ship`]);
              continue;
            }
            if (segments.length > 1 && DENY_TOP_DIRS.has(segments[0].toLowerCase())) {
              violations.push([path, `top-level '${segments[0]}/' is internal tooling`]);
              continue;
            }
            for (const [re, reason, exempt] of DENY_BASENAMES) {
              if (re.test(basename) && !(exempt && exempt(basename))) {
                violations.push([path, reason]);
                break;
              }
            }
          }

          if (violations.length > 0) {
            for (const [path, reason] of violations) {
              console.error(`::error::packlist gate: tarball would ship '${path}' (${reason})`);
            }
            console.error(`::error::packlist gate: ${violations.length} disallowed path(s) in the npm pack listing — add a package.json "files" allowlist (cinatra-engineering#56). Refusing to publish.`);
            process.exit(1);
          }
          console.log(`packlist gate OK — ${files.length} file(s), no disallowed paths.`);
          PACKLIST_GATE_EOF
          # `--ignore-scripts`: `npm pack --dry-run` STILL runs the package's
          # prepare/prepack/postpack lifecycle scripts (npm only skips writing the
          # tarball, not the hooks). Extracted/published manifests preserve their
          # `scripts` verbatim (extract-extension-repos.mjs), and the job grants
          # `id-token: write`, so a lifecycle hook here could mint/exfiltrate an
          # OIDC token or mutate the tree the real pack then ships — the same trust
          # boundary the install steps already harden with `--ignore-scripts`. The
          # gate inspects the file LIST only; no lifecycle code is needed.
          ( cd "$PACK_DIR" && npm pack --dry-run --json --silent --ignore-scripts ) > "$RUNNER_TEMP/npm-packlist.json"
          node "$RUNNER_TEMP/packlist-gate.mjs" "$RUNNER_TEMP/npm-packlist.json"

      # Packs FROM the staged serverEntry build dir when one exists (so the
      # tarball carries the built register.mjs + the rewritten PACKED manifest);
      # the tarball always lands in the workspace root so every downstream step
      # (attest, submit, Release assets) keeps a single path convention.
      #
      # `--ignore-scripts`: this job grants `id-token: write` (provenance + the
      # dependency-gate/source-identity mints), so the runner exposes
      # ACTIONS_ID_TOKEN_REQUEST_* to EVERY step — a per-step `env:` cannot remove
      # a job-level permission, and GitHub Actions permissions are job-scoped (they
      # cannot be scoped to a single step). So harden the pack itself, exactly as
      # the install steps do: published/extracted manifests preserve their `scripts`
      # verbatim (extract-extension-repos.mjs), and `npm pack` would otherwise run
      # the package's prepare/prepack/postpack hooks while the OIDC request vars are
      # present — a hook could mint/exfiltrate a token or mutate the packed bytes
      # AFTER the packlist gate ran. The published artifact is the BUILT bytes
      # already staged above; no lifecycle hook is needed to produce the tarball.
      - name: Pack
        id: pack
        if: steps.gate.outputs.should_publish == 'true'
        env:
          PACK_DIR: ${{ steps.server_build.outputs.pack_dir || '.' }}
        run: |
          set -euo pipefail
          TARBALL="$( ( cd "$PACK_DIR" && npm pack --silent --ignore-scripts --pack-destination "$GITHUB_WORKSPACE" ) | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "Packed ${TARBALL} (from ${PACK_DIR})"

      # Build provenance for the exact published bytes. Marketplace-side
      # verification of this attestation in trusted-vendor auto-approve is a
      # later step; generating it now means the artifact is attestable on day one.
      - name: Attest build provenance
        if: steps.gate.outputs.should_publish == 'true'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      # Install the two public runtime deps release-submit.mjs lazy-imports
      # (pacote + the MCP SDK). The job grants `id-token: write` (for provenance
      # AND the dependency-gate + source-identity mints below), so the runner exposes
      # ACTIONS_ID_TOKEN_REQUEST_* to EVERY step — a per-step `env:` cannot remove a
      # job-level permission. So harden the install itself: `--ignore-scripts` runs
      # NO lifecycle/postinstall code (pacote + the MCP SDK need none), so an
      # untrusted transitive dependency cannot execute code to mint/exfiltrate an
      # OIDC token here; blanking the request vars is belt-and-suspenders. The
      # tokens are minted ONLY in the guarded submit step that immediately follows.
      - name: Install submit-tool deps
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          # Stage the submit tool + its two public deps in an ISOLATED temp dir
          # OUTSIDE the extension repo tree, so npm never walks up to the extension's
          # package.json / peer graph (a UI connector's react + @cinatra-ai/sdk-*
          # peers crash npm's resolver: ERESOLVE → "Cannot read properties of null").
          # The tool is run from here in the submit step; its ESM `import` resolves
          # pacote/MCP from this dir's node_modules.
          mkdir -p "$RUNNER_TEMP/cinatra-submit"
          cp "$RUNNER_TEMP/cinatra-tools/release-submit.mjs" "$RUNNER_TEMP/cinatra-submit/release-submit.mjs"
          # The submit tool's serverEntry preflight (packed-manifest contract,
          # cinatra#161) lazy-imports the builder module for the shared exports
          # resolver + artifact classifier — keep the two files siblings.
          cp "$RUNNER_TEMP/cinatra-tools/build-server-entry.mjs" "$RUNNER_TEMP/cinatra-submit/build-server-entry.mjs"
          ( cd "$RUNNER_TEMP/cinatra-submit" && npm install --no-save --no-package-lock --ignore-scripts pacote@^21 @modelcontextprotocol/sdk@^1.29.0 )

      - name: Submit through the marketplace proxy (dependency-gated, source-identity-signed)
        if: steps.gate.outputs.should_publish == 'true'
        env:
          CINATRA_MARKETPLACE_VENDOR_TOKEN: ${{ secrets.CINATRA_MARKETPLACE_VENDOR_TOKEN }}
        run: |
          set -euo pipefail
          # Mint GitHub Actions OIDC tokens — GitHub-signed claims: repository,
          # repository_owner, repository_visibility, and job_workflow_ref of THIS
          # blessed reusable workflow — scoped to the marketplace audience. The
          # marketplace verifies them: the dependency-gate ability hard-fails an
          # unverifiable caller, and the submit predicate auto-approves a first-party
          # public submit.
          #
          # TWO SEPARATE tokens are minted because the marketplace abilities consume
          # a SINGLE-USE jti per call: one token authenticates exactly ONE call.
          # Token #1 (CINATRA_DEP_GATE_IDENTITY_TOKEN) authenticates the dependency-
          # ordering gate's `cinatra/extension-dependency-exists` call inside the
          # submit tool; token #2 (CINATRA_SOURCE_IDENTITY_TOKEN) is the source-
          # identity for the submit call itself. Reusing one token for both would let
          # the gate's consume break the submit (or vice-versa). Each curl to the
          # request URL returns a token with a distinct jti. Tokens are minted AND
          # consumed inside THIS step: never written to GITHUB_OUTPUT / a file / a
          # log, and masked defensively before the submit tool runs.
          mint_marketplace_oidc() {
            # Echoes a fresh OIDC token (aud=marketplace) on stdout, or empty on any
            # failure. Each call yields a distinct jti.
            if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              return 0
            fi
            resp="$(curl -sS \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://marketplace.cinatra.ai" || true)"
            printf '%s' "$resp" | node -e 'let s="";process.stdin.on("data",d=>{s+=d});process.stdin.on("end",()=>{try{process.stdout.write(String(JSON.parse(s).value||""))}catch{process.stdout.write("")}})' || true
            resp=""
          }

          # Token #1 — dependency-ordering gate (MANDATORY in CI). The gate is the
          # ordering guarantee; if no token can be minted, do NOT silently continue —
          # the submit tool's gate fails CLOSED on an empty CINATRA_DEP_GATE_IDENTITY_TOKEN
          # (no fallback to a registry read or a skip). We warn here; the tool emits
          # the fatal, actionable failure.
          CINATRA_DEP_GATE_IDENTITY_TOKEN="$(mint_marketplace_oidc)"
          if [ -n "${CINATRA_DEP_GATE_IDENTITY_TOKEN:-}" ]; then
            echo "::add-mask::${CINATRA_DEP_GATE_IDENTITY_TOKEN}"
            export CINATRA_DEP_GATE_IDENTITY_TOKEN
            echo "Minted dependency-gate OIDC token (aud=https://marketplace.cinatra.ai)."
          else
            echo "::warning::dependency-gate OIDC mint returned no token (id-token: write?) — the dependency-ordering gate will fail closed."
          fi

          # Token #2 — submit source-identity (BEST-EFFORT). A missing token only
          # routes the submission to manual moderation (never an auto-reject).
          CINATRA_SOURCE_IDENTITY_TOKEN="$(mint_marketplace_oidc)"
          if [ -n "${CINATRA_SOURCE_IDENTITY_TOKEN:-}" ]; then
            echo "::add-mask::${CINATRA_SOURCE_IDENTITY_TOKEN}"
            export CINATRA_SOURCE_IDENTITY_TOKEN
            echo "Minted source-identity OIDC token (aud=https://marketplace.cinatra.ai)."
          else
            echo "::warning::source-identity OIDC mint returned no token — submitting without it (manual moderation)."
          fi

          node "$RUNNER_TEMP/cinatra-submit/release-submit.mjs" "$PWD/${{ steps.pack.outputs.tarball }}"

      # Hand the EXACT submitted bytes to the github-release job below. Placed
      # AFTER the submit step on purpose: the Release page never carries an
      # artifact the marketplace did not receive.
      - name: Upload tarball for the Release job
        if: steps.gate.outputs.should_publish == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-pack-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  # Post-submit: give the tag a GitHub Release page that carries the release
  # contract — auto-generated "What's Changed" PR-list notes plus the exact
  # packed tarball and a SHA256SUMS.txt — so any tag maps to the set of shipped
  # PRs and a downloadable, hash-pinnable artifact (GitHub's auto source
  # zip/tar.gz archives have no checksum-stability guarantee).
  #
  # NO `permissions:` block on purpose: a called workflow can only DOWNGRADE the
  # caller's token grant — requesting `contents: write` here would hard-fail the
  # entire run for every existing thin caller that still grants
  # `contents: read`. The job inherits the caller's token instead and degrades
  # to a loud warning (the 403 handling below) when write is missing, so the
  # marketplace publish keeps working for not-yet-updated callers. Callers
  # enable Release decoration with a one-line bump (see examples/release.yml).
  github-release:
    needs: release
    if: needs.release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download packed tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-pack-tarball

      # Immutable-safe decoration. Two distinct paths, both idempotent:
      #
      # 1. CREATE path (the tag has no Release yet — the normal post-submit case,
      #    and every workflow_dispatch backfill on a bare tag). `gh release create`
      #    is handed the tarball + SHA256SUMS.txt as POSITIONAL ASSET ARGS, so it
      #    runs the draft→upload-assets→publish sequence in ONE operation: the
      #    assets are attached to the DRAFT and are therefore present at the instant
      #    of publish. Under GitHub Immutable Releases (which locks assets only
      #    AFTER publish) this is the supported pattern — the release is born
      #    immutable WITH its assets, never mutated afterward. `--verify-tag` is
      #    preserved: it aborts if the tag does not already exist, so this workflow
      #    NEVER creates tags — owners cut tags, CI only decorates. No `--clobber`
      #    here: a fresh release has nothing to clobber, and `create` already
      #    publishes the final asset set atomically.
      #
      # 2. EXISTING-RELEASE fallback (a `release: published` run where the publish
      #    event already materialized the Release before this job ran — the
      #    pre-immutability era). Backfill auto-generated notes ONLY when the body
      #    is empty (never overwrite author-written notes), then attach the assets
      #    via `gh release upload --clobber` (re-run safe). This path can only ever
      #    succeed against a MUTABLE release. POST-FLIP it can never mutate an
      #    immutable release: the upload/edit returns HTTP 422 (the release is
      #    locked), `decorate` returns non-zero, and the error fails LOUD below — it
      #    is NOT swallowed by the missing-write warning (that warning matches the
      #    403 contents:write signature only). An immutable existing release that
      #    lacks assets is an unreachable state for releases born through path 1, so
      #    this fallback is a graceful bridge for legacy releases, not a mutation of
      #    immutable ones.
      - name: Create/decorate GitHub Release (PR-list notes, tarball, checksums)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag }}
          REPO: ${{ github.repository }}
          TARBALL: ${{ needs.release.outputs.tarball }}
        run: |
          set -euo pipefail
          sha256sum "$TARBALL" > SHA256SUMS.txt
          cat SHA256SUMS.txt

          # Explicit `|| return 1` per write: the function runs in an `if !`
          # condition context, where bash suppresses `set -e` inside the body —
          # without them a failed notes backfill would be silently swallowed.
          # The body check is whitespace-aware (command substitution + strip):
          # `gh --jq` always emits a trailing newline, so a bytes-on-disk test
          # would mistake an empty body for an authored one.
          decorate() {
            local body
            if body="$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""' 2>/dev/null)"; then
              # Path 2: release already exists (legacy/mutable). Decorate in place.
              echo "Release $TAG already exists — decorating it (mutable-release fallback)."
              if [ -z "${body//[[:space:]]/}" ]; then
                echo "Empty release body — backfilling auto-generated PR-list notes."
                gh api "repos/${REPO}/releases/generate-notes" -f tag_name="$TAG" --jq .body > notes.md || return 1
                gh release edit "$TAG" --repo "$REPO" --notes-file notes.md || return 1
              fi
              # Will fail LOUD (HTTP 422) if the existing release is immutable.
              gh release upload "$TAG" --repo "$REPO" --clobber "$TARBALL" SHA256SUMS.txt || return 1
            else
              # Path 1: single-operation create-with-assets (draft→upload→publish).
              # Immutable-safe: assets are present BEFORE the release is published.
              gh release create "$TAG" "$TARBALL" SHA256SUMS.txt --repo "$REPO" --title "$TAG" --generate-notes --verify-tag || return 1
            fi
          }

          if ! decorate 2> err.log; then
            cat err.log >&2
            # Swallow ONLY a genuine missing-`contents: write` 403 (so the
            # marketplace publish still succeeds for not-yet-bumped callers). An
            # immutability lock surfaces as HTTP 422 / "immutable" and must NOT be
            # swallowed — it falls through to `exit 1` and fails the job loud.
            if grep -qiE 'HTTP 403|Resource not accessible' err.log \
               && ! grep -qiE 'HTTP 422|immutab|cannot be (modified|deleted|added)' err.log; then
              echo "::warning::GITHUB_TOKEN lacks 'contents: write' — the marketplace submit succeeded, but the GitHub Release was not created/decorated. Bump the caller's permissions block (contents: read → write, see examples/release.yml) to enable PR-list notes + tarball/checksums attachment."
              exit 0
            fi
            exit 1
          fi
          cat err.log >&2 || true
