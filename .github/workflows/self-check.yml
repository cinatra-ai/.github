# Dogfood: this repo's own scripts (currently: the release-notes reporter-
# credit decorator) must pass their unit tests on every change.
name: self-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Run unit tests
        run: node --test scripts/__tests__/*.test.mjs
