# Reusable GitHub Release decoration for NON-extension cinatra-ai repos
# ("plain" repos, PHP/deploy repos — any repo that cuts v* tags but does not
# publish an npm package through reusable-extension-release.yml).
#
# One job: given a tag (pushed, or passed in for a backfill), make sure the
# tag's GitHub Release page exists and carries auto-generated "What's Changed"
# PR-list notes — so any tag maps to the exact set of shipped PRs. GitHub
# auto-exposes `Source code (zip/tar.gz)` on every Release; a repo's root
# `.gitattributes` `export-ignore` rules govern what those archives contain.
# No other artifacts are attached (plain repos have no build artifact to ship;
# extension repos get tarball + checksums from reusable-extension-release.yml).
#
# Contract (mirrors cinatra core's create-release job + the marketplace
# release pipeline's gates):
#   - SEMVER tags only — the EXACT regex below is shared with cinatra core's
#     create-release job and marketplace's semver gate. A non-semver `v*` tag
#     (checkpoint/marker) is a NO-OP, not a failure.
#   - ANNOTATED tags only — a lightweight `v*` semver tag FAILS the run (the
#     org release contract requires `git tag -a`; same rule the marketplace
#     deploy pipeline enforces).
#   - This workflow NEVER creates tags (`--verify-tag` fails closed on a
#     missing tag) and NEVER overwrites author-written release notes: an
#     existing Release body is backfilled only when empty/whitespace.
#   - Idempotent + race-safe: re-runs no-op on an already-decorated Release;
#     a create race falls back to the decorate path.
#   - Reporter credit: each "What's Changed" PR line gets `Reported by
#     @handle` appended when a linked (closing) issue's author differs from
#     the PR author — derived ONLY from the PR's closingIssuesReferences (the
#     platform link graph), never `Closes #N` text-parsing. Self-reported /
#     no linked issue / bot reporter is omitted; a private-repo reporter is
#     NEVER surfaced (fail-closed — see scripts/decorate-release-notes.mjs).
#     A credit-lookup failure never fails the run: it just leaves the raw,
#     undecorated GitHub notes in place.
#
# Caller contract: trigger on `push: tags: ["v*"]` (plus an optional
# `workflow_dispatch` with a `tag` input for backfilling existing tags — old
# tags don't contain this workflow file, so backfills run from the default
# branch and pass the tag explicitly). The caller MUST grant
# `contents: write`; with less, the run fails at plan time. No secrets are
# needed (GITHUB_TOKEN only) — do NOT pass `secrets: inherit`.
# See examples/github-release.yml for a copy-me caller.

name: reusable-release-notes

on:
  workflow_call:
    inputs:
      tag:
        description: >-
          Existing tag to decorate (backfill path). Leave empty on tag-push
          triggers — the pushed tag is used.
        type: string
        required: false
        default: ""

jobs:
  release-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # create/edit the Release (callers must grant this)
    concurrency:
      group: release-notes-${{ github.repository }}-${{ inputs.tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Resolve + semver-gate the tag
        id: gate
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          elif [[ "${REF}" == refs/tags/* ]]; then
            tag="${REF_NAME}"
          else
            echo "FAIL: not a tag push and no 'tag' input. Trigger this workflow from a v* tag push, or dispatch it with the tag to decorate." >&2
            exit 1
          fi
          echo "tag=${tag}" >>"$GITHUB_OUTPUT"
          # EXACT regex shared with cinatra core's create-release job and the
          # marketplace release pipeline. Non-semver v* tags are markers — no-op.
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?([.+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "should_run=true" >>"$GITHUB_OUTPUT"
            echo "::notice::'$tag' is a semver release tag — Release decoration will run."
          else
            echo "should_run=false" >>"$GITHUB_OUTPUT"
            echo "::notice::'$tag' is NOT a semver tag (checkpoint/marker) — no-op."
          fi

      - name: Checkout (full history + tags)
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Annotated tags MUST survive to the tagmeta step. Without this,
          # checkout's tag-push path re-fetches the pushed ref BY COMMIT SHA
          # (`+<sha>:refs/tags/<tag>`), overwriting the annotated tag OBJECT
          # locally with a lightweight (commit) ref — so `git cat-file -t` below
          # would falsely report a LIGHTWEIGHT tag for a genuinely annotated one.
          # fetch-tags keeps the `+refs/tags/*:refs/tags/*` refspec that carries
          # the tag object. (The tagmeta step ALSO force-refetches tag refs as a
          # belt-and-suspenders against checkout-version drift.)
          fetch-tags: true

      # This reusable workflow is CALLED by other repos (`uses: cinatra-ai/
      # .github/.github/workflows/reusable-release-notes.yml@<ref>`) — the
      # checkout above is the CALLER's repo, not this one, so the reporter-
      # credit decoration script below isn't on disk yet. Pull the repo/SHA
      # that actually defines the running job (`job.workflow_repository` +
      # `job.workflow_sha`) — NOT `github.repository`/`github.sha` (the
      # caller's repo/commit), and NOT any top-level `github.workflow_*`
      # equivalent (the reusable-workflow's own identity is only exposed on
      # the `job` context) — so the script always matches the workflow logic
      # that invokes it, into a side directory that can't collide with the
      # caller's tree.
      - name: Checkout release-notes decoration script (this repo, pinned to the running workflow's own SHA)
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .release-notes-tooling

      - name: Set up Node.js (reporter-credit decoration)
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Verify tag is annotated + compute previous semver tag
        if: steps.gate.outputs.should_run == 'true'
        id: tagmeta
        env:
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          # Re-establish the ANNOTATED tag objects locally before inspecting
          # them. `actions/checkout`'s tag-push path can rewrite the local tag
          # ref to point at the commit (a lightweight ref) via a
          # `+<sha>:refs/tags/<tag>` fetch, which would make an annotated tag
          # look lightweight to `git cat-file -t` below. Force-refetching the
          # tag refs restores the tag OBJECT (a truly lightweight tag on the
          # remote still resolves to a commit, so the gate below still rejects
          # it). Belt-and-suspenders with the checkout step's `fetch-tags: true`
          # — this also survives a checkout-version change to that behaviour.
          git fetch --force --tags origin '+refs/tags/*:refs/tags/*' >/dev/null 2>&1 || true
          # Annotated-tag check: an annotated tag is a `tag` object; a
          # lightweight tag resolves to a `commit`. The org release contract
          # requires annotated tags (immutable intent + tagger/date metadata)
          # — same fail-closed rule as the marketplace deploy pipeline.
          obj_type=$(git cat-file -t "$TAG" 2>/dev/null || echo "missing")
          case "$obj_type" in
            tag)
              echo "::notice::'$TAG' is an annotated tag." ;;
            commit)
              echo "FAIL: '$TAG' is a LIGHTWEIGHT tag — releases must be annotated (git tag -a). Refusing to decorate." >&2
              exit 1 ;;
            *)
              echo "FAIL: tag '$TAG' not found in this repository." >&2
              exit 1 ;;
          esac
          # Previous semver tag REACHABLE from the tagged commit, as an explicit
          # generate-notes start point. Without it, repos whose older tags never
          # had Releases can get a wrong/noisy auto-detected range. "Previous" =
          # the highest reachable semver tag strictly BELOW $TAG in version-sort
          # order (sorting the candidates together with $TAG and taking the
          # entry just before it — NOT simply the highest other tag, which could
          # sit above a backported/lower $TAG). `sort -V` is an approximation of
          # semver precedence (prerelease suffixes sort after the release), which
          # is acceptable for a notes start point. Empty (first release) lets
          # GitHub fall back to its default full-changelog behavior.
          # Decorate-sort-undecorate: map the first `-` (prerelease separator)
          # to `~`, which GNU `sort -V` orders BEFORE end-of-string — giving
          # correct semver precedence (an rc/beta prerelease sorts before the
          # release it precedes), then walk the sorted list to the entry just
          # before $TAG.
          prev=$({ git tag --merged "${TAG}^{commit}" \
              | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?([.+-][0-9A-Za-z.-]+)?$' \
              | grep -Fxv "$TAG" || true; echo "$TAG"; } \
            | awk '{ s=$0; sub(/-/,"~",s); print s "\t" $0 }' \
            | sort -V | cut -f2 \
            | awk -v t="$TAG" '$0==t{print p; exit} {p=$0}')
          echo "prev=${prev}" >>"$GITHUB_OUTPUT"
          echo "==> previous semver tag: ${prev:-<none — first release>}"

      # Idempotent + race-safe. Explicit `|| return 1` per write: the
      # functions run in an `if !` condition context, where bash suppresses
      # `set -e` inside the body — without them a failed notes backfill would
      # be silently swallowed. The body check is whitespace-aware: `gh --jq`
      # always emits a trailing newline, so a bytes-on-disk test would mistake
      # an empty body for an authored one.
      - name: Create or backfill the GitHub Release (PR-list notes)
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.gate.outputs.tag }}
          PREV: ${{ steps.tagmeta.outputs.prev }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Raw GitHub-generated "What's Changed" PR-list notes for $TAG,
          # pinned to $PREV when a previous semver tag exists.
          generate_raw_notes() {
            local args=(-f tag_name="$TAG")
            if [ -n "$PREV" ]; then
              args+=(-f previous_tag_name="$PREV")
            fi
            gh api "repos/${REPO}/releases/generate-notes" "${args[@]}" --jq .body
          }

          # Adds `Reported by @handle` credit to each "What's Changed" PR line
          # whose linked (closing) issue's author differs from the PR author —
          # the org's reporter-credit convention. Reporter data comes ONLY
          # from each PR's closingIssuesReferences
          # (the platform link graph), never `Closes #N` text-parsing. Fails
          # closed and NEVER fails the run: any error fetching/applying credit
          # data (or no PRs at all, e.g. a first release) leaves the raw notes
          # exactly as GitHub generated them — a missing credit is cosmetic,
          # never a reason to break Release publication.
          decorate_notes() {
            local raw_file="$1" out_file="$2"
            local owner="${REPO%%/*}" repo_name="${REPO#*/}"
            local pr_numbers
            pr_numbers=$(grep -oE '/pull/[0-9]+' "$raw_file" | grep -oE '[0-9]+' | sort -un || true)
            if [ -z "$pr_numbers" ]; then
              cp "$raw_file" "$out_file"
              return 0
            fi
            local aliases="" n
            for n in $pr_numbers; do
              aliases+="pr${n}: pullRequest(number: ${n}) { closingIssuesReferences(first: 100) { nodes { author { login __typename } repository { isPrivate } } } } "
            done
            local query
            query=$(printf 'query { repository(owner: %s, name: %s) { %s } }' \
              "$(jq -Rn --arg s "$owner" '$s')" "$(jq -Rn --arg s "$repo_name" '$s')" "$aliases")
            if ! gh api graphql -f query="$query" > graphql-raw.json 2>graphql.err; then
              echo "::warning::Reporter-credit lookup failed (closingIssuesReferences query) — leaving notes undecorated. $(cat graphql.err)"
              cp "$raw_file" "$out_file"
              return 0
            fi
            # Normalize into { "<prNumber>": [{login, isPrivate, isBot}] }.
            # isPrivate defaults to true (fail-closed) whenever GitHub didn't
            # resolve it explicitly to false — an unresolved/inaccessible
            # linked repo must NEVER be assumed public.
            if ! jq '
              (.data.repository // {})
              | to_entries
              | map(select(.value != null))
              | map({
                  key: (.key | ltrimstr("pr")),
                  value: ((.value.closingIssuesReferences.nodes // []) | map({
                    login: .author.login,
                    isPrivate: (if .repository.isPrivate == false then false else true end),
                    isBot: (.author.__typename == "Bot")
                  }))
                })
              | from_entries
            ' graphql-raw.json > closing-issues.json; then
              echo "::warning::Reporter-credit data normalization failed — leaving notes undecorated."
              cp "$raw_file" "$out_file"
              return 0
            fi
            if ! node .release-notes-tooling/scripts/decorate-release-notes.mjs "$raw_file" closing-issues.json > "$out_file"; then
              echo "::warning::Reporter-credit decoration failed — leaving notes undecorated."
              cp "$raw_file" "$out_file"
            fi
          }

          # Backfill ONLY when the body is empty/whitespace — the same check on
          # every path, so even a create race can never overwrite notes a human
          # wrote concurrently. The notes are generated (+ credit-decorated)
          # FIRST and the body is re-read immediately before the edit,
          # shrinking the unavoidable check-then-write window (the releases
          # API has no compare-and-swap) to the single view→edit hop.
          backfill_if_empty() {
            local body
            body="$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""' 2>/dev/null)" || return 1
            if [ -n "${body//[[:space:]]/}" ]; then
              echo "::notice::Release $TAG already has notes — left untouched (author-written notes are never overwritten)."
              return 0
            fi
            generate_raw_notes > notes.md || return 1
            decorate_notes notes.md notes-decorated.md || return 1
            # Re-check just before writing: a human may have written notes
            # while the generate call ran.
            body="$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""' 2>/dev/null)" || return 1
            if [ -n "${body//[[:space:]]/}" ]; then
              echo "::notice::Release $TAG gained notes while generating — left untouched."
              return 0
            fi
            echo "Release $TAG has an empty body — backfilling auto-generated PR-list notes."
            gh release edit "$TAG" --repo "$REPO" --notes-file notes-decorated.md || return 1
          }

          decorate() {
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              backfill_if_empty || return 1
              return 0
            fi
            # Generate + credit-decorate BEFORE creating: `--generate-notes` on
            # `gh release create` would bypass the reporter-credit decoration
            # (GitHub builds the body server-side), so the notes are built
            # explicitly here and passed via --notes-file instead (still
            # --verify-tag, still never creates the tag).
            generate_raw_notes > notes.md || return 1
            decorate_notes notes.md notes-decorated.md || return 1
            local create_args=(--repo "$REPO" --title "$TAG" --notes-file notes-decorated.md --verify-tag)
            if gh release create "$TAG" "${create_args[@]}"; then
              return 0
            fi
            # Create race (re-run / double event): if the Release appeared
            # concurrently, fall back to the decorate path — which re-checks
            # body emptiness; otherwise a real failure.
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "::notice::Release $TAG appeared concurrently — decorating it instead."
              backfill_if_empty || return 1
              return 0
            fi
            return 1
          }

          if ! decorate; then
            echo "FAIL: could not create/decorate the GitHub Release for $TAG." >&2
            echo "If the error above is HTTP 403 / 'Resource not accessible', the caller must grant 'contents: write' (see examples/github-release.yml)." >&2
            exit 1
          fi
