# ── COPY ME ──────────────────────────────────────────────────────────────────
# Per-repo caller for the Cinatra Marketplace release pipeline.
#
# Drop this file into an extracted extension repo at:
#     .github/workflows/release.yml
# (the v6.22 extractor already ships an identical caller into every extracted
# repo; this is the canonical reference copy for hand-wiring or auditing.)
#
# A published GitHub Release whose tag is `v<package.json.version>` builds +
# SUBMITS this extension to the Cinatra Marketplace through the marketplace MCP
# publish-proxy (cinatra-extension-submit-for-review → human/trusted-vendor
# approve → promotion saga → registry.cinatra.ai). It NEVER publishes to
# Verdaccio directly, and it NEVER deletes/archives a repo.
#
# All build / pack / gate / submit logic lives in the central reusable workflow
# at cinatra-ai/.github. This file only:
#   - wires the `release: published` trigger (the tag==v<version> gate is enforced
#     inside the reusable workflow — a tag != v<version>, or a pre-release tag, is
#     skipped, not published),
#   - grants the provenance-attestation permissions,
#   - inherits the org-level submit secret.
#
# Dormant until the org infra exists: the cinatra-ai/.github reusable workflow
# (already placed) + the CINATRA_MARKETPLACE_VENDOR_TOKEN org secret.
name: release

on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual backfill — MUST be run against a `v<version>` tag ref

jobs:
  release:
    permissions:
      contents: read
      id-token: write       # build-provenance attestation (OIDC)
      attestations: write
    uses: cinatra-ai/.github/.github/workflows/reusable-extension-release.yml@main
    secrets: inherit
